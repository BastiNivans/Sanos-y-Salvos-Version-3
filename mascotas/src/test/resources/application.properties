# Configuracion exclusiva para tests: usa H2 en memoria en vez de PostgreSQL,
# asi @SpringBootTest puede levantar el contexto completo sin necesitar
# una base de datos real corriendo. No afecta application.properties de produccion.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
