# Conexión a tu nuevo PostgreSQL Local
spring.datasource.url=jdbc:postgresql://localhost:5432/sanos_salvos_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Hibernate para que cree las tablas solo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# Puerto del microservicio mascotas
server.port=8081