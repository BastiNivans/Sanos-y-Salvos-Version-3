spring.application.name=geolocalizacion

# Puerto del microservicio
server.port=8083

# Conexión a PostgreSQL con PostGIS
spring.datasource.url=jdbc:postgresql://localhost:5432/sanos_salvos_geolocalizacion
spring.datasource.username=postgres
spring.datasource.password=1234

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 🆕 DIALECTO CORRECTO para Hibernate 6.x (Spring Boot 3.x/4.x)
spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisDialect

# Configuración adicional
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.open-in-view=false